```html
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>中国古桥地图 - 无重叠版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        #map { width: 100%; height: 600px; }
        h1 { text-align: center; margin: 20px 0 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; }
        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 999;
        }
        .legend-dot { display: inline-block; width: 10px; height: 10px; background: #ff4444; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>
    <h1>🏯 中国四大古桥分布地图</h1>
    <div class="subtitle">📍 红色标记点 = 著名古桥位置 | 点击标记查看详情</div>
    <div id="map"></div>
    <div class="legend">
        <div><span class="legend-dot"></span> 古桥标记点</div>
        <div>💡 点击标记跳转介绍页</div>
    </div>

    <script>
        // 四座古桥数据：[名称, 经度, 纬度, 跳转页面]
        const ancientBridges = [
            { name: '赵州桥', city: '河北赵县', lng: 114.78, lat: 37.82, page: 'zhaozhouqiao' },
            { name: '洛阳桥', city: '福建泉州', lng: 118.68, lat: 24.91, page: 'luoyangqiao' },
            { name: '广济桥', city: '广东潮州', lng: 116.65, lat: 23.67, page: 'guangjiqiao' },
            { name: '卢沟桥', city: '北京', lng: 116.22, lat: 39.85, page: 'lugouqiao' }
        ];

        // 转换为散点图数据格式
        const scatterData = ancientBridges.map(bridge => ({
            name: bridge.name,
            value: [bridge.lng, bridge.lat],
            city: bridge.city,
            page: bridge.page
        }));

        var myChart = echarts.init(document.getElementById('map'));
        myChart.showLoading();

        $.getJSON('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json', function(geoJson) {
            myChart.hideLoading();
            echarts.registerMap('china', geoJson);

            var option = {
                // 地理坐标系配置
                geo: {
                    map: 'china',
                    roam: true,
                    zoom: 1.2,
                    center: [108, 35],
                    label: {
                        show: true,
                        fontSize: 10,
                        color: '#555'
                    },
                    emphasis: {
                        label: { show: true, fontWeight: 'bold' },
                        itemStyle: { areaColor: '#ffd966' }
                    },
                    itemStyle: {
                        borderColor: '#cbb386',
                        borderWidth: 0.8,
                        areaColor: '#f7efdf'
                    }
                },
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        if (params.seriesType === 'scatter') {
                            return `<b>🏯 ${params.data.name}</b><br/>📍 ${params.data.city}<br/>✨ 点击查看详细介绍`;
                        } else if (params.componentSubType === 'geo') {
                            return `<b>${params.name}</b><br/>该地区古桥信息请点击红色标记点`;
                        }
                        return params.name;
                    }
                },
                series: [{
                    type: 'scatter',
                    coordinateSystem: 'geo',
                    data: scatterData,
                    symbolSize: 22,
                    symbol: 'circle',
                    itemStyle: {
                        color: '#ff4444',
                        borderColor: '#ffffff',
                        borderWidth: 2,
                        shadowBlur: 8,
                        shadowColor: 'rgba(0,0,0,0.3)'
                    },
                    label: {
                        show: true,
                        formatter: function(params) {
                            return params.data.name;
                        },
                        position: 'top',
                        offset: [0, 8],
                        fontSize: 12,
                        fontWeight: 'bold',
                        color: '#c0392b',
                        textShadowBlur: 2,
                        textShadowColor: '#fff'
                    },
                    emphasis: {
                        scale: true,
                        label: { show: true, fontWeight: 'bold', fontSize: 13 },
                        itemStyle: { color: '#ff6666', shadowBlur: 15 }
                    }
                }]
            };

            myChart.setOption(option);

            // 点击事件：处理散点图点击
            myChart.on('click', function(params) {
                if (params.seriesType === 'scatter' && params.data) {
                    const bridge = params.data;
                    openBridgePage(bridge.name, bridge.city, bridge.page);
                } else if (params.componentSubType === 'geo') {
                    alert(`【${params.name}】\n该地区的古桥信息请点击地图上的红色标记点 🏯`);
                }
            });

            console.log('地图加载完成，红色标记点为四座古桥位置');
        }).fail(function() {
            myChart.hideLoading();
            alert('地图加载失败，请检查网络后刷新');
        });

        // 打开古桥介绍页
        function openBridgePage(name, city, pageId) {
            var win = window.open();
            win.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>${name} - 古桥介绍</title>
                    <style>
                        body {
                            font-family: 'Microsoft YaHei', Arial, sans-serif;
                            max-width: 800px;
                            margin: 50px auto;
                            padding: 20px;
                            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        }
                        .card {
                            background: white;
                            border-radius: 20px;
                            padding: 35px;
                            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
                            text-align: center;
                        }
                        h1 { color: #ff4444; font-size: 36px; margin-bottom: 10px; }
                        .subtitle { color: #888; margin-bottom: 30px; border-bottom: 2px solid #ff4444; display: inline-block; padding-bottom: 5px; }
                        .info { text-align: left; background: #f9f9f9; padding: 20px; border-radius: 15px; margin: 20px 0; }
                        .info p { margin: 12px 0; line-height: 1.6; }
                        .highlight { color: #ff4444; font-weight: bold; }
                        button {
                            background: #4a90e2;
                            color: white;
                            border: none;
                            padding: 12px 28px;
                            border-radius: 30px;
                            font-size: 16px;
                            cursor: pointer;
                            margin-top: 15px;
                            transition: all 0.3s;
                        }
                        button:hover { background: #ff4444; transform: scale(1.02); }
                        .emoji { font-size: 48px; margin-bottom: 10px; }
                    </style>
                </head>
                <body>
                    <div class="card">
                        <div class="emoji">🏯</div>
                        <h1>${name}</h1>
                        <div class="subtitle">📍 ${city}</div>
                        <div class="info">
                            <p><span class="highlight">📜 简介：</span>${name}是中国著名的古代桥梁建筑，见证了悠久的历史文化。</p>
                            <p><span class="highlight">🏗️ 特色：</span>独特的桥梁结构和精湛的建筑工艺，体现了古代工匠的智慧。</p>
                            <p><span class="highlight">📖 地位：</span>国家重点文物保护单位，具有极高的历史和艺术价值。</p>
                        </div>
                        <button onclick="window.close()">✖ 关闭窗口</button>
                    </div>
                </body>
                </html>
            `);
        }

        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
```
